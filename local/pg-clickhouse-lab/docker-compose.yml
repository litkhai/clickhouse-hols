services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.5
    container_name: pgch-clickhouse
    hostname: clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native TCP (binary driver)
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - pgch_net

  postgres:
    image: ghcr.io/clickhouse/pg_clickhouse:18
    container_name: pgch-postgres
    hostname: postgres
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - pgch_net

networks:
  pgch_net:
    name: pgch_net
    driver: bridge
