# ClickHouse OSS + Superset — 한국 시군구 지도 PoC
# 두 서비스는 같은 compose / 같은 네트워크(korea-geo)에 있으므로
# Superset 컨테이너에서 ClickHouse를 서비스명 `clickhouse:8123`(HTTP) / `clickhouse:9000`(native)으로 접근한다.
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.5
    container_name: kg-clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      # 로컬 PoC: default 유저, 패스워드 없음
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./ddl:/ddl:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - korea-geo

  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    image: kg-superset:local
    container_name: kg-superset
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "korea_geo_poc_secret_change_me_0123456789abcdef"
      # deck.gl 베이스맵 타일 토큰(있으면 지도 배경이 깔끔히 뜸). 없으면 폴리곤만 렌더.
      MAPBOX_API_KEY: "${MAPBOX_API_KEY:-}"
      # bootstrap.sh 가 읽는 admin 계정
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
    volumes:
      - superset_home:/app/superset_home
    networks:
      - korea-geo

volumes:
  ch_data:
  superset_home:

networks:
  korea-geo:
    name: korea-geo
