# ─────────────────────────────────────────────────────────────────────────────
#  Enterprise Edition (EE) overlay — labs 05–07
#
#  Adds the enterprise license key to BOTH Langfuse containers. The key unlocks:
#    • Project-level RBAC roles        • Audit Logs (UI viewer + export)
#    • Data Retention policies         • SCIM / Organization-scoped API
#    • Server-side data masking        • UI customization, Org creators allowlist
#
#  Usage (merge overlay on top of the base compose):
#    docker compose -f docker-compose.yml -f docker-compose.ee.yml up -d
#
#  The `:?` guard makes compose FAIL FAST with a clear message if you forgot to
#  set LANGFUSE_EE_LICENSE_KEY in .env. Core/OSS features never need this file.
#  https://langfuse.com/self-hosting/license-key
# ─────────────────────────────────────────────────────────────────────────────
services:
  langfuse-worker:
    environment:
      LANGFUSE_EE_LICENSE_KEY: ${LANGFUSE_EE_LICENSE_KEY:?Set LANGFUSE_EE_LICENSE_KEY in .env to enable Enterprise features}

  langfuse-web:
    environment:
      LANGFUSE_EE_LICENSE_KEY: ${LANGFUSE_EE_LICENSE_KEY:?Set LANGFUSE_EE_LICENSE_KEY in .env to enable Enterprise features}
      # Instance Management API (/api/admin/*) — Bearer-authenticated with this key.
      # Used by 06-ee-rbac-scim.sh to create orgs + org-scoped API keys.
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
